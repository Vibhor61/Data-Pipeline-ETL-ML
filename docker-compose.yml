services:
  postgres:
    image: postgres:15
    container_name: retail_postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d  # For automatic initialization 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build: .
    container_name: airflow_metadata
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /opt/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ETL:/opt/airflow/ETL
      - ./ML:/opt/airflow/ML
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    # Runs against airflow_db
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    build: .
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      PYTHONPATH: /opt/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ETL:/opt/airflow/ETL
      - ./ML:/opt/airflow/ML
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: .
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      PYTHONPATH: /opt/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ETL:/opt/airflow/ETL
      - ./ML:/opt/airflow/ML
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: scheduler
  
  mlflow:
    image: mlflow
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow/mlruns:/app/mlruns
      - ./mlflow/mlflow.db:/app/mlflow.db
      - ./
    restart: unless-stopped

volumes:
  postgres_data: