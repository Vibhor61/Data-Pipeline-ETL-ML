services:
  postgres:
    image: postgres:15
    container_name: retail_postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d  # For automatic initialization 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_metadata
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /opt/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ETL:/opt/airflow/ETL
      - ./ML:/opt/airflow/ML
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    # Runs against airflow_db
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      PYTHONPATH: /opt/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ETL:/opt/airflow/ETL
      - ./ML:/opt/airflow/ML
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: 
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      PYTHONPATH: /opt/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ETL:/opt/airflow/ETL
      - ./ML:/opt/airflow/ML
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    command: scheduler
  
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlflow_server
    working_dir: /mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow/artifacts:/mlflow/artifacts
    environment:
      MLFLOW_TRACKING_URI: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/mlflow_db
    command: >
      mlflow server
      --backend-store-uri postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/mlflow_db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: